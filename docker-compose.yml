services:
  ogham:
    build: .
    image: ogham-mcp:latest
    env_file: .env
    # stdio transport - stdin/stdout are the MCP channel
    stdin_open: true
    # Reach host Ollama from inside the container
    extra_hosts:
      - "host.docker.internal:host-gateway"

  postgres-scratch:
    image: pgvector/pgvector:pg17
    profiles: ["test"]
    environment:
      POSTGRES_USER: ogham
      POSTGRES_PASSWORD: ogham
      POSTGRES_DB: ogham_scratch
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ogham -d ogham_scratch"]
      interval: 2s
      timeout: 5s
      retries: 20
