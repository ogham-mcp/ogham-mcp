# Arabic word lists for Ogham MCP extraction and scoring.
# Notes: Right-to-left script but UTF-8 substring matching works identically.
# Gregorian month names use Egyptian/Gulf forms (most widely understood).

day_names:
  "الأحد": 0
  "الاثنين": 1
  "الإثنين": 1
  "الثلاثاء": 2
  "الأربعاء": 3
  "الخميس": 4
  "الجمعة": 5
  "السبت": 6
