# German word lists for Ogham MCP extraction and scoring.
# Notes: Day names have adverbial "-s" forms (montags = "on Mondays") implying recurrence.
# All nouns capitalized in German but we store lowercase for matching.

day_names:
  sonntag: 0
  montag: 1
  dienstag: 2
  mittwoch: 3
  donnerstag: 4
  freitag: 5
  samstag: 6
  # Adverbial recurrence forms
  sonntags: 0
  montags: 1
  dienstags: 2
  mittwochs: 3
  donnerstags: 4
  freitags: 5
  samstags: 6

month_names:
  januar: 1
  februar: 2
  "märz": 3
  maerz: 3
  april: 4
  mai: 5
  juni: 6
  juli: 7
  august: 8
  september: 9
  oktober: 10
  november: 11
  dezember: 12
  # Abbreviations
  jan: 1
  feb: 2
  "mär": 3
  apr: 4
  jun: 6
  jul: 7
  aug: 8
  sep: 9
  okt: 10
  nov: 11
  dez: 12

