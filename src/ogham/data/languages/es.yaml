  febrero: 2
  marzo: 3
  abril: 4
  mayo: 5
  junio: 6
  julio: 7
  agosto: 8
  septiembre: 9
  setiembre: 9
  octubre: 10
  noviembre: 11
  diciembre: 12
  # Abbreviations
  ene: 1
  feb: 2
  mar: 3
  abr: 4
  may: 5
  jun: 6
  jul: 7
  ago: 8
  sep: 9
