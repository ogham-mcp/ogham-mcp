# Spanish word lists for Ogham MCP extraction and scoring.
# Notes: Month/day names are lowercase. "manana" means both "tomorrow" and "morning".

day_names:
  domingo: 0
  lunes: 1
  martes: 2
  "miércoles": 3
  miercoles: 3
  jueves: 4
  viernes: 5
  "sábado": 6
