# French word lists for Ogham MCP extraction and scoring.
# Notes: Month/day names are lowercase in French. All months are masculine.

day_names:
  dimanche: 0
  lundi: 1
  mardi: 2
  mercredi: 3
  jeudi: 4
  vendredi: 5
  samedi: 6

month_names:
  janvier: 1
  "février": 2
  fevrier: 2
  mars: 3
  avril: 4
  mai: 5
  juin: 6
  juillet: 7
  "août": 8
  aout: 8
  septembre: 9
  octobre: 10
  novembre: 11
  "décembre": 12
  decembre: 12
  # Abbreviations
  jan: 1
  "fév": 2
  fev: 2
  avr: 4
  jui: 7
  sep: 9
  oct: 10
  nov: 11
  "déc": 12
  dec: 12

