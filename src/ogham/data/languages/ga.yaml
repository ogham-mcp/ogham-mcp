# Irish (Gaelic) word lists for Ogham MCP extraction and scoring.
# Notes: Days use "De" prefix (genitive, meaning "day of") for "on [day]".
# Fada (a, e, i, o, u with accents) is critical but ASCII fallbacks included.

day_names:
  # Base forms
  domhnach: 0
  luan: 1
  "máirt": 2
  mairt: 2
  "céadaoin": 3
  ceadaoin: 3
  "déardaoin": 4
  deardaoin: 4
  aoine: 5
  satharn: 6
  # "De" prefix forms (on a specific day)
  "dé domhnaigh": 0
  de domhnaigh: 0
  "dé luain": 1
  de luain: 1
  "dé máirt": 2
  de mairt: 2
  "dé céadaoin": 3
  de ceadaoin: 3
  "dé haoine": 5
  de haoine: 5
  "dé sathairn": 6
  de sathairn: 6
  # "An" prefix forms (generic/habitual)
  an domhnach: 0

