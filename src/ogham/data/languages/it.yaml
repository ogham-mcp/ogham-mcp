# Italian word lists for Ogham MCP extraction and scoring.
# Notes: Month/day names are lowercase. Accented forms included with ASCII fallbacks.

day_names:
  domenica: 0
  "lunedì": 1
  lunedi: 1
  "martedì": 2
  martedi: 2
  "mercoledì": 3
  mercoledi: 3
  "giovedì": 4
  giovedi: 4
  "venerdì": 5
  venerdi: 5
  sabato: 6

month_names:
  gennaio: 1
  febbraio: 2
  marzo: 3
  aprile: 4
  maggio: 5
  giugno: 6
  luglio: 7
  agosto: 8
  settembre: 9
  ottobre: 10
  novembre: 11
  dicembre: 12
