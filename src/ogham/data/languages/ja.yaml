# Japanese word lists for Ogham MCP extraction and scoring.
# Notes: CJK substring matching -- no word boundaries needed.
# Months use number + yue. Day names use kanji + youbi (full) or you (short).

day_names:
  "日曜日": 0
  "月曜日": 1
  "火曜日": 2
  "水曜日": 3
  "木曜日": 4
  "金曜日": 5
  "土曜日": 6
  # Short forms
  "日曜": 0
  "月曜": 1
  "火曜": 2
  "水曜": 3
  "木曜": 4
  "金曜": 5
  "土曜": 6

month_names:
  "1月": 1
  "2月": 2
  "3月": 3
  "4月": 4
  "5月": 5
  "6月": 6
  "7月": 7
  "8月": 8
  "9月": 9
  "10月": 10
  "11月": 11
  "12月": 12
  # Full kanji number forms
  "一月": 1
  "二月": 2
  "三月": 3
  "四月": 4
  "五月": 5
  "六月": 6
  "七月": 7
  "八月": 8
  "九月": 9
  "十月": 10
  "十一月": 11
  "十二月": 12

