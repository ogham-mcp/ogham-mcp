  "2월": 2
  "3월": 3
  "4월": 4
  "5월": 5
  "6월": 6
  "7월": 7
  "8월": 8
  "9월": 9
  "10월": 10
  "11월": 11
  "12월": 12
  # Full Sino-Korean names
  "일월": 1
  "이월": 2
  "삼월": 3
  "사월": 4
  "오월": 5
  "유월": 6
