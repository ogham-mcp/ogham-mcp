# Korean word lists for Ogham MCP extraction and scoring.
# Notes: CJK substring matching. Months use number + wol.
# June (yuwol) and October (siwol) have special pronunciation forms.

day_names:
  "일요일": 0
  "월요일": 1
  "화요일": 2
  "수요일": 3
  "목요일": 4
  "금요일": 5
  "토요일": 6

month_names:
