# Portuguese (European) word lists for Ogham MCP extraction and scoring.
# Notes: Month/day names are lowercase. Days use ordinal + "-feira" pattern.
# "sabado" and "domingo" are the exceptions (no "-feira").

day_names:
  domingo: 0
  segunda: 1
  segunda-feira: 1
  "terça": 2
  "terça-feira": 2
  terca: 2
  terca-feira: 2
  quarta: 3
  quarta-feira: 3
  quinta: 4
  quinta-feira: 4
  sexta: 5
  sexta-feira: 5
  "sábado": 6
  sabado: 6

month_names:
  janeiro: 1
  fevereiro: 2
  "março": 3
  marco: 3
  abril: 4
  maio: 5
  junho: 6
  julho: 7
  agosto: 8
  setembro: 9
  outubro: 10
  novembro: 11
  dezembro: 12
  # Abbreviations
  jan: 1
  fev: 2
  mar: 3
  abr: 4
  mai: 5
  jun: 6
  jul: 7
  ago: 8
  set: 9
  out: 10
  nov: 11
  dez: 12

