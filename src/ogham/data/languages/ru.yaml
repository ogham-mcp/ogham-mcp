# Russian word lists for Ogham MCP extraction and scoring.
# Notes: Cyrillic script. Month names are lowercase. All months are masculine.

day_names:
  "воскресенье": 0
  "понедельник": 1
  "вторник": 2
  "среда": 3
  "четверг": 4
  "пятница": 5
  "суббота": 6

month_names:
