# Turkish word lists for Ogham MCP extraction and scoring.
# Notes: Turkish uses dotted i/I and dotless i/I distinction. Store lowercase with
# both forms. Agglutinative suffixes can attach to day/month names.

day_names:
  pazar: 0
  pazartesi: 1
  "salı": 2
  sali: 2
  "çarşamba": 3
  carsamba: 3
  "perşembe": 4
  persembe: 4
  cuma: 5
  cumartesi: 6

month_names:
  ocak: 1
  "şubat": 2
  subat: 2
  mart: 3
  nisan: 4
  "mayıs": 5
  mayis: 5
  haziran: 6
  temmuz: 7
  "ağustos": 8
  agustos: 8
  "eylül": 9
  eylul: 9
  ekim: 10
  "kasım": 11
  kasim: 11
  "aralık": 12
  aralik: 12

