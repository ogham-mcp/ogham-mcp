# Chinese (Simplified) word lists for Ogham MCP extraction and scoring.
# Notes: No spaces between words. Substring matching works well for CJK.
# Months are number + yue. Both xingqi and zhou prefixes used for days.

day_names:
  "星期日": 0
  "星期天": 0
  "星期一": 1
  "星期二": 2
  "星期三": 3
  "星期四": 4
  "星期五": 5
  "星期六": 6
  "周日": 0
  "周天": 0
  "周一": 1
  "周二": 2
  "周三": 3
  "周四": 4
  "周五": 5
  "周六": 6
  # Formal/written forms
  "礼拜日": 0
  "礼拜天": 0
  "礼拜一": 1
  "礼拜二": 2
  "礼拜三": 3
  "礼拜四": 4
  "礼拜五": 5
  "礼拜六": 6

month_names:
