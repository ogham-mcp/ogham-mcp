# Ogham Hooks Configuration
# Signal filtering and secret masking patterns.
# Edit this file to customise what gets captured and masked.
# Changes take effect on next hook invocation (no restart needed).

# --- Signal filtering (verb-only, multilingual) ---
#
# Only bash activity matching a VERB/EVENT keyword is captured. The
# previous noun-heavy list (config, docker, supabase, neon, auth, token,
# schema, etc.) caused daily infrastructure work to be captured as
# "signal" when it was really just routine. These lists now reflect
# events that HAPPENED (past-tense verbs + explicit annotation markers)
# rather than topics that were MENTIONED.
#
# Multilingual coverage mirrors the 18-lang extraction YAMLs in
# ogham-cli/internal/native/extraction/languages/*.yaml -- keep these
# lists in sync when adding languages. Long-term: have hooks read those
# YAMLs directly instead of duplicating here.

signals:
  errors:
    # EN
    - error
    - failed
    - failure
    - bug
    - broken
    - broke
    - crash
    - crashed
    - exception
    - traceback
    - stacktrace
    - segfault
    - panic
    - regression
    # DE
    - fehler
    - fehlgeschlagen
    - ausnahme
    - absturz
    - defekt
    - abgebrochen
    - zeitüberschreitung
    # FR
    - erreur
    - échoué
    - échec
    - bogue
    - cassé
    - plantage
    # ES
    - fallido
    - fallo
    - roto
    - caída
    # IT
    - errore
    - eccezione
    - fallito
    - guasto
    - rotto
    # PT
    - erro
    - exceção
    - falhou
    - falha
    - quebrado
    # NL
    - fout
