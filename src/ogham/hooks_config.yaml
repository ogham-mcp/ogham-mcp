  architecture:
    # EN
    - refactored
    - restructured
    - decoupled
    - rewrote
    - redesigned
    # DE
    - refaktorisierung
    - umstrukturierung
    - entkoppelt
    - neu geschrieben
    # FR
    - refactorisation
    - restructuration
