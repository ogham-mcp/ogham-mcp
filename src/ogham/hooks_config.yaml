    - décidé
    - choisi
    - migré
    - sélectionné
    - remplacé
    - adopté
    - opté
    - basculé
    - déployé
    - fusionné
    # ES
    - decidido
    - elegido
    - migrado
    - seleccionado
    - reemplazado
    - adoptado
    - optado
    - cambiado
    - desplegado
    - fusionado
    # IT
    - deciso
    - scelto
    - migrato
    - selezionato
    - sostituito
    - adottato
    - optato
    - cambiato
